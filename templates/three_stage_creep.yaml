template_name: Three Stage Creep
description: 标准三阶段蠕变风格（主-稳态-加速）。
key_effects: ["高概率 three_stage", "阶段分界随机", "尾部加速上翘"]
default_parameters: {num_curves: 3, curve_shape: three_stage, line_style: solid, marker: triangle, legend_position: inside_upper_left, grid: false, points_per_curve: 220, noise_level: 0.012}
probability_distributions:
  num_curves: {"2": 0.2, "3": 0.6, "4": 0.2}
  curve_shape: {three_stage: 0.85, accelerated_obvious: 0.1, primary_obvious: 0.05}
  line_style: {solid: 0.7, dashed: 0.2, dashdot: 0.1}
  marker: {triangle: 0.55, circle: 0.25, square: 0.2}
  legend_position: {inside_upper_left: 0.6, inside_upper_right: 0.25, outside_right: 0.15}
  grid: {false: 0.7, true: 0.3}
